{% extends "account/base.html" %}
{% load i18n %}
{% load static %}

{% block page_content %}
<div class="card shadow-sm p-4">

    <h4 class="mb-3">{% trans "Password Reset Complete" %}</h4>

    <p class="text-muted">
        {% trans "Your password has been successfully changed. You can now sign in." %}
    </p>

    <a href="{% url 'account_login' %}" class="btn btn-outline-primary">
        {% trans "Return to Login" %}
    </a>

</div>
{% endblock %}
