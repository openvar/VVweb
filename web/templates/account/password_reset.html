{% extends "account/base.html" %}
{% load i18n %}
{% load static %}

{% block page_content %}
<div class="card shadow-sm p-4">

    <h4 class="mb-3">{% trans "Reset Your Password" %}</h4>

    <p class="text-muted">
        {% trans "Enter the email address associated with your account, and we'll send you a reset link." %}
    </p>

    <form method="post" class="mt-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">
            {% trans "Send Reset Email" %}
        </button>
    </form>

</div>
{% endblock %}
