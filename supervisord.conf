##############################################################################
# SUPERVISOR MAIN CONFIG
##############################################################################

[supervisord]
logfile=/local/VVweb/logs/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/local/VVweb/supervisord.pid
nodaemon=false
minfds=1024
minprocs=200

[unix_http_server]
file=/local/VVweb/supervisord.sock
chmod=0777

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///local/VVweb/supervisord.sock


##############################################################################
# CELERY WORKER — PRODUCTION SAFE (MULTI‑PROCESS VIA CONCURRENCY)
##############################################################################

[program:celery_worker]
command=/bin/bash -c "source /local/miniconda3/etc/profile.d/conda.sh && conda activate vvweb_v2 && exec celery -A VVweb worker -l error --concurrency=8 --pidfile=/local/VVweb/celery_worker.pid"
directory=/local/VVweb
user=wwwrun
autostart=true
autorestart=true
stopwaitsecs=20
stdout_logfile=/local/VVweb/logs/celery_worker_out.log
stderr_logfile=/local/VVweb/logs/celery_worker_err.log
redirect_stderr=true


##############################################################################
# CELERY BEAT — SINGLE SCHEDULER (CORRECT)
##############################################################################

[program:celery_beat]
command=/bin/bash -c "source /local/miniconda3/etc/profile.d/conda.sh && conda activate vvweb_v2 && exec celery -A VVweb beat -l error --scheduler django_celery_beat.schedulers.DatabaseScheduler --pidfile=/local/VVweb/celery_beat.pid"
directory=/local/VVweb
user=wwwrun
autostart=true
autorestart=true
stopwaitsecs=20
stdout_logfile=/local/VVweb/logs/celery_beat_out.log
stderr_logfile=/local/VVweb/logs/celery_beat_err.log
redirect_stderr=true


##############################################################################
# NOTES FOR STABILITY AND SAFETY
#
# 1. Use ONLY ONE celery_worker program — scale using --concurrency=N.
#    (This cleans up pidfile issues and stops rogue worker duplication.)
#
# 2. NEVER define multiple Celery workers using the same pidfile.
#
# 3. ALWAYS run Celery workers inside the vvweb_v2 conda environment.
#
# 4. After ANY code update, purge, or pool cleanup:
#       sudo supervisorctl reread
#       sudo supervisorctl update
#       sudo supervisorctl restart celery_worker
#
# 5. If you purge TaskResult table, ALWAYS restart Celery workers.
#
# 6. Celery beat MUST be a single instance (1 scheduler).
#
